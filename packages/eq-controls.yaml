# ─────────────────────────────────────────────────────────────────────────────
# packages/eq-controls.yaml
#
# Shared EQ controls package — include via:
#
#   packages:
#     eq_controls: github://farmed-switch/esphome-snapspots-dev/packages/eq-controls.yaml@main
#
# REQUIREMENTS in your device YAML:
#   - shared_audio: block present (activates the software EQ library)
#   - A switch with  id: hw_eq_switch  and  internal: true  (e.g. TAS5805M enable_eq)
#     The switch must exist for the DSP Mode lambda to compile, but should be
#     hidden from HA (internal: true) since the dropdown controls it exclusively.
#   - substitutions.friendly_name defined
#
# DSP MODE BEHAVIOUR:
#   "Off"                — both SW and HW EQ disabled
#   "Software EQ 15-band"— ISO 2/3-octave 15-band running on ESP32 CPU
#                         (frequencies: 25 40 63 100 160 250 400 630 1k
#                          1.6k 2.5k 4k 6.3k 10k 16kHz, Q=1.4)
#   "Hardware DSP"       — TAS5805M on-chip EQ activated, SW EQ disabled
#
# EQ PRESET — only applies to Software EQ mode.
# EQ BAND SLIDERS — 15 sliders (band 0..14), ISO 2/3-octave.
# ─────────────────────────────────────────────────────────────────────────────

select:
  # ── DSP Mode ─────────────────────────────────────────────────────────────
  - platform: template
    name: "${friendly_name} DSP Mode"
    id: dsp_mode
    options:
      - "Off"
      - "Software EQ 15-band"
      - "Hardware DSP"
    initial_option: "Off"
    restore_value: true
    set_action:
      - lambda: |-
          if (x == "Software EQ 15-band") {
            id(hw_eq_switch).turn_off();
            eq_set_mode(15);
            enable_eq(true);
          } else if (x == "Hardware DSP") {
            enable_eq(false);
            id(hw_eq_switch).turn_on();
          } else {
            // "Off": disable both
            enable_eq(false);
            id(hw_eq_switch).turn_off();
          }

  # ── EQ Preset (Software EQ only) ─────────────────────────────────────────
  - platform: template
    name: "${friendly_name} EQ Preset"
    id: eq_preset
    restore_value: true
    options:
      - "Flat (Bypass)"
      - "Flat (Full Range)"
      - "Subwoofer"
      - "Bookshelf"
      - "Floor Standing"
      - "Near Field"
      - "Small/Portable"
      - "Custom"
    initial_option: "Flat (Bypass)"
    set_action:
      - lambda: 'apply_eq_preset(x.c_str());'

number:
  # ── ISO 2/3-octave 15-band sliders (band index 0–14) ─────────────────────
  - platform: template
    name: "${friendly_name} EQ 25Hz"
    id: eq_band_0
    min_value: -15
    max_value: 15
    step: 0.5
    initial_value: 0
    optimistic: true
    restore_value: true
    set_action:
      - lambda: 'set_eq_band(0, x);'
